name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ROUTE42
    env:
      ROUTE42_KEYSTORE_BASE64: ${{ secrets.ROUTE42_KEYSTORE_BASE64 }}
      ROUTE42_KEYSTORE_PASSWORD: ${{ secrets.ROUTE42_KEYSTORE_PASSWORD }}
      ROUTE42_KEY_ALIAS: ${{ secrets.ROUTE42_KEY_ALIAS }}
      ROUTE42_KEY_PASSWORD: ${{ secrets.ROUTE42_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate signing secrets
        shell: bash
        run: |
          test -n "${ROUTE42_KEYSTORE_BASE64}" || { echo "Missing ROUTE42_KEYSTORE_BASE64" >&2; exit 1; }
          test -n "${ROUTE42_KEYSTORE_PASSWORD}" || { echo "Missing ROUTE42_KEYSTORE_PASSWORD" >&2; exit 1; }
          test -n "${ROUTE42_KEY_ALIAS}" || { echo "Missing ROUTE42_KEY_ALIAS" >&2; exit 1; }
          test -n "${ROUTE42_KEY_PASSWORD}" || { echo "Missing ROUTE42_KEY_PASSWORD" >&2; exit 1; }

      - name: Decode signing keystore
        shell: bash
        run: |
          keystore_path="${RUNNER_TEMP}/route42-release.keystore"
          printf '%s' "${ROUTE42_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"
          echo "ROUTE42_KEYSTORE_PATH=${keystore_path}" >> "${GITHUB_ENV}"

      - name: Run tests and build APK
        env:
          ROUTE42_KEYSTORE_PASSWORD: ${{ env.ROUTE42_KEYSTORE_PASSWORD }}
          ROUTE42_KEY_ALIAS: ${{ env.ROUTE42_KEY_ALIAS }}
          ROUTE42_KEY_PASSWORD: ${{ env.ROUTE42_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest assembleRelease

      - name: Prepare release artifact
        id: asset
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="manual-${GITHUB_RUN_NUMBER}"
          fi
          asset_name="Route42-${version}-release.apk"
          asset_path="${PWD}/dist/${asset_name}"
          cp app/build/outputs/apk/release/app-release.apk "${asset_path}"

          echo "asset_name=${asset_name}" >> "${GITHUB_OUTPUT}"
          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: route42-release-apk
          path: ${{ steps.asset.outputs.asset_path }}

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          ASSET_PATH: ${{ steps.asset.outputs.asset_path }}
        run: |
          gh release view "${TAG_NAME}" >/dev/null 2>&1 || gh release create "${TAG_NAME}" --title "${TAG_NAME}" --generate-notes
          gh release upload "${TAG_NAME}" "${ASSET_PATH}" --clobber
